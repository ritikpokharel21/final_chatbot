<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Festival International 2026 - AI Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #f0f4f8;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .chat-container {
      width: 100%;
      max-width: 100%;
      height: 100vh;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10);
    } 50%{opacity:0.3;} }
50%{opacity:0.3;} }
    .chips-bar {
      padding: 10px 14px;
      display: flex;
      gap: 7px;
      overflow-x: auto;
      flex-shrink: 0;
      background: #f8fafb;
      border-bottom: 1px solid #e8edf2;
      scrollbar-width: none;
    }
    .chips-bar::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0;
      background: #ffffff;
      border: 1.5px solid #d1dbe6;
      color: #3a5a6e;
      font-family: 'Nunito', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 5px 13px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .chip:hover { background: #1a6b3c; border-color: #1a6b3c; color: #ffffff; }
    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #f8fafb;
    }
    .msg { display: flex; gap: 9px; max-width: 88%; animation: fadeUp 0.25s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }
    .avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; margin-top: 2px; }
    .bot .avatar  { background: linear-gradient(135deg, #1a6b3c, #2d9e5f); }
    .user .avatar { background: linear-gradient(135deg, #e8a020, #f5c842); }
    .bubble { padding: 11px 15px; border-radius: 18px; font-size: 0.83rem; line-height: 1.65; }
    .bot .bubble { background: #ffffff; border: 1px solid #dde5ed; border-top-left-radius: 4px; color: #2c3e50; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .user .bubble { background: linear-gradient(135deg, #1a6b3c, #2d9e5f); border-top-right-radius: 4px; color: #ffffff; }
    .typing-dots { display:flex; gap:4px; align-items:center; padding:2px 0; }
    .typing-dots span { width:7px; height:7px; background: #aac0cc; border-radius:50%; animation: bounce 1.2s infinite; }
    .typing-dots span:nth-child(2){animation-delay:0.2s;}
    .typing-dots span:nth-child(3){animation-delay:0.4s;}
    @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:0.4;} 40%{transform:translateY(-5px);opacity:1;} }
    .input-area { flex-shrink: 0; background: #ffffff; border-top: 1px solid #dde5ed; padding: 12px 14px; display: flex; gap: 9px; align-items: flex-end; }
    #user-input {
      flex: 1;
      background: #f2f6f9;
      border: 1.5px solid #dde5ed;
      border-radius: 22px;
      color: #2c3e50;
      font-family: 'Nunito', sans-serif;
      font-size: 0.83rem;
      font-weight: 600;
      padding: 10px 16px;
      resize: none;
      outline: none;
      max-height: 100px;
      overflow-y: auto;
      line-height: 1.5;
      transition: border-color 0.2s;
      scrollbar-width: none;
    }
    #user-input:focus { border-color: #1a6b3c; background:#fff; }
    #user-input::placeholder { color: #9ab0be; font-weight: 500; }
    #send-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #1a6b3c, #2d9e5f);
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, opacity 0.2s;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(26,107,60,0.3);
    }
    #send-btn:hover { transform: scale(1.07); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    #send-btn svg { width: 17px; height: 17px; }
  </style>
</head>
<body>
<div class="chat-container">
</div>
  <div class="chips-bar">
    <button class="chip" onclick="sendChip(this)">🎵 Music lineup</button>
    <button class="chip" onclick="sendChip(this)">🍴 Food options</button>
    <button class="chip" onclick="sendChip(this)">💳 How to pay</button>
    <button class="chip" onclick="sendChip(this)">🗺️ Getting around</button>
    <button class="chip" onclick="sendChip(this)">🌍 World music stages</button>
    <button class="chip" onclick="sendChip(this)">🍺 Biergarten info</button>
    <button class="chip" onclick="sendChip(this)">🅿️ Parking & shuttle</button>
    <button class="chip" onclick="sendChip(this)">♿ Accessibility</button>
    <button class="chip" onclick="sendChip(this)">📍 Stage locations</button>
    <button class="chip" onclick="sendChip(this)">🙋 Volunteer info</button>
  </div>

  <div id="chat-window">
    <div class="msg bot">
      <div class="avatar">🎶</div>
      <div class="bubble">
        Welcome to <strong>Festival International de Louisiane 2026</strong>. I'm your AI Assistant.
      </div>
    </div>
  </div>

  <div class="input-area">
    <textarea id="user-input" rows="1" placeholder="Ask me anything about the festival…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  
</div>

<script>
const SYSTEM_PROMPT = `You are a friendly, enthusiastic local guide for the Festival International de Louisiane 2026 in Lafayette, Louisiana. Speak warmly, like a helpful local who loves the festival. Use English only. The festival runs April 22-26, 2026 and celebrates its 40th anniversary. It is the largest international music festival in the United States. Official website: https://www.festivalinternational.org

=== ADMISSION & GENERAL ===
- Admission is 100% FREE - no entry fee, no ticket needed
- Located in Downtown Lafayette, Louisiana
- 5-day celebration: April 22-26, 2026
- 40th Anniversary theme
- Largest international music festival in the U.S.
- Presented by LFT Fiber
- All ages welcome

=== PAYMENT - VERY IMPORTANT ===
- Festival uses a CASHLESS RFID wristband system sponsored by First Horizon
- You CANNOT pay with cash or card directly at food/drink/merch booths
- You must load money onto your RFID wristband first
- Load funds via the Festival app OR in person at Wristband Registration tents on site
- You can add funds to your wristband with cash or card at the registration tents
- ATM locations are marked on the site map
- Art vendors (crafts) DO accept cash and cards directly — they do NOT use RFID wristbands
- More info: festivalinternational.org/payments

=== STAGES & LOCATIONS ===
- Scene LUS (INTERNATIONALE) — Main stage, southeast near Taylor St & Congress. Biggest world music headliners.
- Scene Ochsner Lafayette General (FAIS DO DO) — Southwest corner near Lee St. Cajun and Zydeco music.
- Scene CODOFIL (FRANCOSPHERE) — Center-west near Vermilion & Principale/Main. French-language and Francophone acts.
- Scene Wellcare — North area near Buchanan. Diverse lineup.
- Sonic Scene des Jeunes — Far northwest near Versailles & St. John. Youth and emerging artists. Kids activities here too.
- LUS LA Craft Biergarten — Center-north near Jefferson & Buchanan. Live music and craft beer.

=== MUSIC LINEUP ===
World/International: Stephen Marley (Jamaica), Cimafunk (Cuba), Delgres (France/Guadeloupe), Natu Camara (Guinea), Nomfusi (South Africa), Las Cafeteras (U.S./Mexico), Vieux Farka Toure (Mali), NOVALIMA (Peru), Silver Birds Steel Orchestra (Jamaica), Sinkane (Sudan), Boma Bango (DR Congo/Columbia/Louisiana), Primera Linea (Cuba), Dragon Knights Stilt Show (France/U.S.)
Cajun/Zydeco: Zachary Richard, Steve Riley & the Mamou Playboys, Chris Ardoin & Zydeco Nu-Step, Nathan & the Zydeco Cha Chas, Jourdan Thibodeaux et les Rodailleurs, Rusty Metoyer & the Zydeco Krush, Corey Ledet Zydeco & Black Magic, Mike Dopsie & Zydeco Entourage, Geno Delafose & French Rockin Boogie, Bonsoir Catin
Americana/Folk: Rhiannon Giddens (U.S.), Sonny Landreth, GIVERS In Light Live, Slap Dragon ft. Scott Mulvahill
Celtic/Francophone: Vishten (Prince Edward Island), Breabach (Scotland), Jacques Surette (Nova Scotia), Beauséjour (New Brunswick), Thome Young (New Brunswick), Mathieu Lippe (Quebec)
Local/Louisiana: Sally Babys Silver Dollars, Karma and the Killjoys, Dustin Dale Gaspard, Soul Express Brass Band, Amis du Teche, Dwight James and the Royals, KC Jones, The Revelers, Krewe de Canailles, Bas Clas, Beau Cheval, Cashier, Michael Juan Nunez, Yvette Landry Trio, Mike Dean Band, Burke Riley Trio
Youth/Educational: SOLA Violins Intl Fiddle Summit, Acadiana Symphony Youth Orchestra, School of Rock Lafayette, The Babineaux Sisters, Battle of the Bands, French Immersion Student Performance, Lafayette Lion Dance, New Natives Brass Band
Full schedule: festivalinternational.org/schedule

=== FOOD & DRINK ===
- International food vendors throughout festival grounds (Asian, Cajun, Greek and more!)
- LUS LA Craft Biergarten — craft beers near Jefferson & Buchanan
- Beer stands at multiple locations across grounds
- Cocktails and mixed drinks available
- Non-alcoholic beverages available
- THC Beverages available
- Vegetarian options available
- Local Cajun food, sweet treats, spicy street eats, quick bites
- All food/drink purchased with RFID wristband (not cash)
- More info: festivalinternational.org/festival-eats

=== EXPERIENCES & SPECIAL EVENTS ===
- Festival Pass Program — VIP perks like close-up stage views and private restrooms. Passes go on sale early February 2026. Visit festivalinternational.org/passes
- Fest Fam Bingo — fun activity for attendees
- Courir 5K Run — festivalinternational.org/courir-5k
- Special Events — festivalinternational.org/specialevents
- Kids / Scene des Jeunes — dedicated kids area at Sonic Scene des Jeunes (northwest corner)
- Festival Crafts — art market with handcrafted items, vendors accept cash/card
- Marche du Monde (World Market) — northwest area
- Marche des Arts (Art Market) — two locations on grounds
- Pavillon de Cuisine — cooking pavilion
- 40th Anniversary commemorative book and merchandise available

=== GETTING AROUND & TRANSPORTATION ===
- Downtown Lafayette — grounds are walkable
- Shuttle stops available near Lee St (southwest corner)
- Bike Lafayette Bike Corral on site
- View full maps: festivalinternational.org/maps-transportation
- Site map: festivalinternational.org/site-map

=== AMENITIES & SERVICES ===
- WiFi (LFT Fiber) throughout grounds
- Cash Top-Up / Wristband Registration tents on site
- Festival Merchandise store (La Boutique du Festival)
- First Horizon Rain Angels Tent — weather shelter
- Restrooms (Toilettes) at multiple locations
- Accessible/wheelchair facilities throughout
- Baby Nursing Area (Espace bebe) available
- Lost & Found — fill out form at festivalinternational.org/faq
- Medical Aid (Aide medicale) at multiple locations — look for red cross on map
- Volunteer/Info Centers on site
- French Help Desk (Aide en francais) for Francophone visitors
- McDonald's Pin Booth at multiple locations
- Media Center on site

=== RULES & WHAT TO BRING ===
- NO dogs allowed during Festival (to protect pets and patrons)
- NO ice chests allowed
- NO tents allowed
- Lawn chairs, blankets, wagons, and handheld umbrellas ARE allowed
- Be mindful of space and large crowds

=== VOLUNTEERING ===
- Volunteers are welcome and needed!
- Sign up at: festivalinternational.org/volunteer
- Pick your shift and register online

=== SUPPORT THE FESTIVAL ===
- Festival is a nonprofit event — donations help keep it free
- Buy merchandise: festivalinternational.org shop
- Purchase Festival Passes for VIP perks
- Beverage purchases on site support the festival
- Donor programs: festivalinternational.org/support

=== ACCOMMODATIONS ===
- Hotel info: festivalinternational.org/accommodations

Keep answers short, friendly and easy to read. Use line breaks for lists. Always be helpful and enthusiastic. If someone asks about something not listed here, direct them to festivalinternational.org or suggest visiting an info booth on site. Never make up information.`;

const a = 'gsk_cqhl9EANhmnzjn';
const b = 'PVqd69WGdyb3FYHd';
const c = 'syxltow8ZY5AX6SS';
const d = 'XMGo9v';
const GROQ_KEY = a + b + c + d;

let history = [];
let isLoading = false;

function addMessage(role, html) {
  const win = document.getElementById('chat-window');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'bot' ? '🎶' : '👤';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = html;
  div.appendChild(avatar);
  div.appendChild(bubble);
  win.appendChild(div);
  win.scrollTop = win.scrollHeight;
}

function showTyping() {
  const win = document.getElementById('chat-window');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing-indicator';
  div.innerHTML = '<div class="avatar">🎶</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  win.appendChild(div);
  win.scrollTop = win.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatText(text) {
  return escapeHtml(text)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

async function sendMessage(overrideText) {
  if (isLoading) return;
  const input = document.getElementById('user-input');
  const text = (overrideText || input.value).trim();
  if (!text) return;

  input.value = '';
  autoResize(input);
  addMessage('user', escapeHtml(text));
  history.push({ role: 'user', content: text });

  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  showTyping();

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + GROQ_KEY
      },
      body: JSON.stringify({
        model: 'llama-3.1-8b-instant',
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          ...history
        ],
        max_tokens: 500,
        temperature: 0.7
      })
    });

    const data = await res.json();
    removeTyping();

    const reply = data?.choices?.[0]?.message?.content;
    if (reply) {
      history.push({ role: 'assistant', content: reply });
      addMessage('bot', formatText(reply));
    } else {
      console.error('Groq error:', JSON.stringify(data));
      addMessage('bot', 'Sorry, I had trouble answering that. Please try again!');
    }
  } catch (err) {
    removeTyping();
    console.error('Fetch error:', err);
    addMessage('bot', 'Connection issue — please check your internet and try again.');
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
}

function sendChip(btn) { sendMessage(btn.textContent.trim()); }

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}
</script>
</body>
</html>
